services:
  grafana:
    image: grafana/grafana:13.0.3
    ports:
      - 3000:3000
    volumes:
      - ./grafana-datasource.yaml:/etc/grafana/provisioning/datasources/defaults.yaml
  otelcol:
    image: otel/opentelemetry-collector-contrib:0.155.0
    container_name: otelcol
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
    command: [ "--config=/etc/otelcol-config.yaml", "--config=/etc/otelcol-observability.yaml"]
    volumes:
      - ./otelcol-config.yaml:/etc/otelcol-config.yaml
      - ./otelcol-observability.yaml:/etc/otelcol-observability.yaml
    ports:
      - "4317:4317"          # OTLP over gRPC receiver
      - "4318:4318"     # OTLP over HTTP receiver
      - "9464"          # Prometheus exporter
      - "8888"          # metrics endpoint
    depends_on:
      - jaeger
  prometheus:
    image: quay.io/prometheus/prometheus:v3.12.0
    container_name: prometheus
    command:
      - --web.console.templates=/etc/prometheus/consoles
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --storage.tsdb.retention.time=1h
      - --config.file=/etc/prometheus/prometheus-config.yaml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --web.route-prefix=/
      - --enable-feature=exemplar-storage
    volumes:
      - ./prometheus-config.yaml:/etc/prometheus/prometheus-config.yaml
    deploy:
      resources:
        limits:
          memory: 300M
    ports:
      - "9090:9090"
  jaeger:
    image: jaegertracing/jaeger:2.19.0
    container_name: jaeger
    command:
      - "--config=/etc/jaeger/config.yaml"
    volumes:
      - ./jaeger-config.yaml:/etc/jaeger/config.yaml
    deploy:
      resources:
        limits:
          memory: 400M
    restart: unless-stopped
    ports:
      - "16686"                    # Jaeger UI
      - "4317"                     # OTLP gRPC receiver

networks:
  default:
    name: opentelemetry-demo
    driver: bridge
